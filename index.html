// Binary search
function binarySearch(arr,val){
  let l=0,r=arr.length-1;
  while(l<=r){
    const m=(l+r)>>1;
    if(arr[m]<val)l=m+1;else r=m-1;
  }
  return l;
}

// Convert degrees to microdegrees

    y:Math.round(lat*MF),
    x:Math.round(lon*MF)
  };
}

// Convert microdegrees back to degrees

    lat:y/MF,
    lon:x/MF
  };
}

// Zone search
function findZone(x,y){
  const xi=binarySearch(XI,x);
  const xStart=Math.max(0,xi-20);
  const xEnd=Math.min(XI.length-1,xi+20);
  
  const yi=binarySearch(YI,y);
  const yStart=Math.max(0,yi-20);
  const yEnd=Math.min(YI.length-1,yi+20);
  
  for(let i=xStart;i<=xEnd;i++){
    const zoneId=XID[i];
    const zone=Z[zoneId];
    if(y>=zone[0]&&y<=zone[1]&&x>=zone[2]&&x<=zone[3]){
      return zone;
    }
  }
  
  for(let i=yStart;i<=yEnd;i++){
    const zoneId=YID[i];
    const zone=Z[zoneId];
    if(y>=zone[0]&&y<=zone[1]&&x>=zone[2]&&x<=zone[3]){
      return zone;
    }
  }
  
  return null;
}

}

// Handle errors
function handleError(message){
  const messageEl=document.getElementById('message');
  messageEl.textContent='Ошибка: '+message;

  if(FALLBACK&&FALLBACK.type==='url'){

    },2000);
  }
}

// Main location check
function checkLocation(){
  if(!navigator.geolocation){
    handleError('Определение локации не поддерживается');
    return;
  }
  
  navigator.geolocation.getCurrentPosition(
    (position)=>{
      const lat=position.coords.latitude;
      const lon=position.coords.longitude;
      const accuracy=Math.round(position.coords.accuracy);

        startRedirect(zone[4],'Локация обнаружена!');

        redirectToFallback(lat,lon,microCoords.y,microCoords.x);
      }
    },
    (error)=>{
      let errorMessage='';
      switch(error.code){

    },

      enableHighAccuracy:true,

}
